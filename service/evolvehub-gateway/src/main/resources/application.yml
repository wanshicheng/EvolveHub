server:
  port: 8080

spring:
  application:
    name: evolvehub-gateway

  # ----- Redis (shared token store with auth) -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# ----- Sa-Token (gateway-level validation) -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
