# ==============================================================
# EvolveHub Admin Service - Base Configuration
# ==============================================================
server:
  servlet:
    context-path: /api/admin

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: evolvehub-admin

# ----- Sa-Token -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- MyBatis-Plus -----
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
