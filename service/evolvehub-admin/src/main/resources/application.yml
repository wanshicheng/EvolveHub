server:
  port: 8083

spring:
  application:
    name: evolvehub-admin

  # ----- DataSource -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/evolve_admin
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

# ----- MyBatis-Plus -----
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
