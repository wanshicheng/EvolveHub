# ==============================================================
# EvolveHub Auth Service - Base Configuration
# ==============================================================
# Active profile: override via SPRING_PROFILES_ACTIVE env or --spring.profiles.active
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: evolvehub-auth

server:
  servlet:
    context-path: /api/auth

# 应用配置
app:
  init:
    # 系统初始化密钥（可选），设置后调用 /init-admin 接口时需要提供此密钥
    secret-key: ${INIT_SECRET_KEY:}

# ----- Sa-Token -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- MyBatis-Plus -----
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
