# ==============================================================
# EvolveHub Auth Service - Development Profile
# ==============================================================
server:
  port: 8081

spring:
  # ----- DataSource (local PostgreSQL) -----
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/evolve_auth
    username: postgres
    password: Postgres@2026
    driver-class-name: org.postgresql.Driver

  # ----- Redis (local) -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: Redis@2026
      database: 0

# ----- Logging (development: show SQL) -----
logging:
  level:
    org.evolve: DEBUG
    com.baomidou.mybatisplus: DEBUG
