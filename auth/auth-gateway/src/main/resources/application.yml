server:
  port: 8081

spring:
  application:
    name: evolve-auth-gateway

  # ----- DataSource -----
  datasource:
    url: jdbc:mysql://localhost:3306/evolve_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ----- Redis -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# ----- Sa-Token -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- MyBatis-Plus -----
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
