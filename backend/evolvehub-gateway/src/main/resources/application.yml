# ==============================================================
# EvolveHub Gateway - Base Configuration
# ==============================================================
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: evolvehub-gateway
  cloud:
    gateway:
      server:
        webflux:
          # Global CORS configuration
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: false
                max-age: 3600

# ----- Sa-Token (gateway-level validation) -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info
